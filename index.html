<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radhu ❤️ Adi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle at top,#3b003b,#000000 75%);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
color:white;
}

/* LOADER */

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
animation:hideLoader 3s forwards;
}

.loader h1{
font-size:2rem;
color:#ff4da6;
text-shadow:
0 0 10px #ff0080,
0 0 30px #ff0080;
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}

}

@keyframes hideLoader{

0%,85%{
opacity:1;
visibility:visible;
}

100%{
opacity:0;
visibility:hidden;
}

}

/* STARS */

.stars{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 4s infinite;
}

@keyframes twinkle{

0%,100%{opacity:.2;}
50%{opacity:1;}

}

/* TITLE */

.title{
position:absolute;
top:40px;
text-align:center;
z-index:5;
}

.title h1{
font-size:3.5rem;
text-shadow:
0 0 15px #ff0080,
0 0 35px #ff0080;
}

.title p{
margin-top:10px;
letter-spacing:5px;
color:#ffc7df;
}

/* HEART */

.heart-wrapper{
position:relative;
width:340px;
height:340px;
display:flex;
justify-content:center;
align-items:center;
z-index:5;
}

.glow-ring{
position:absolute;
width:340px;
height:340px;
border-radius:50%;
border:2px solid rgba(255,255,255,.08);
animation:rotate 10s linear infinite;
}

@keyframes rotate{

from{transform:rotate(0deg);}
to{transform:rotate(360deg);}

}

.heart{
position:relative;
width:180px;
height:180px;
background:linear-gradient(145deg,#ff0055,#ff4d88);
transform:rotate(-45deg);
animation:heartbeat 1.5s infinite;
cursor:pointer;

box-shadow:
0 0 40px #ff0066,
0 0 100px rgba(255,0,120,.6);
}

.heart::before,
.heart::after{
content:'';
position:absolute;
width:180px;
height:180px;
background:linear-gradient(145deg,#ff0055,#ff4d88);
border-radius:50%;
}

.heart::before{
top:-90px;
left:0;
}

.heart::after{
left:90px;
top:0;
}

@keyframes heartbeat{

0%{transform:rotate(-45deg) scale(1);}
25%{transform:rotate(-45deg) scale(1.08);}
50%{transform:rotate(-45deg) scale(1);}
75%{transform:rotate(-45deg) scale(1.12);}
100%{transform:rotate(-45deg) scale(1);}

}

/* MESSAGE */

.message{
position:absolute;
bottom:70px;
text-align:center;
z-index:5;
}

.message h2{
font-size:2rem;
text-shadow:
0 0 15px #ff0080;
}

.message p{
margin-top:10px;
letter-spacing:2px;
color:#ffc7df;
}

/* FLOATING HEARTS */

.floating-heart{
position:absolute;
color:#ff4d88;
text-shadow:0 0 20px #ff0080;
animation:floatUp linear forwards;
pointer-events:none;
z-index:2;
}

@keyframes floatUp{

from{
transform:translateY(100vh) scale(.5);
opacity:0;
}

to{
transform:translateY(-120vh) scale(1.6);
opacity:1;
}

}

/* LOVE POPUP */

.love-popup{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:3rem;
font-weight:700;
color:#ff66c4;

text-shadow:
0 0 10px #ff0080,
0 0 30px #ff0080,
0 0 60px #ff0080;

animation:popup 3s forwards;
z-index:9999;
pointer-events:none;
}

@keyframes popup{

0%{
opacity:0;
transform:translate(-50%,-50%) scale(.5);
}

20%{
opacity:1;
transform:translate(-50%,-65%) scale(1.3);
}

100%{
opacity:0;
transform:translate(-50%,-120%) scale(1.5);
}

}

/* BUTTON */

.music-btn{
position:absolute;
bottom:20px;
right:20px;
padding:14px 22px;
border:none;
border-radius:40px;
background:linear-gradient(145deg,#ff0055,#ff4d88);
color:white;
font-size:1rem;
cursor:pointer;
z-index:10;
box-shadow:
0 0 20px rgba(255,0,120,.5);
}

/* MOBILE */

@media(max-width:600px){

.title h1{
font-size:2.2rem;
}

.message h2{
font-size:1.4rem;
}

.heart{
width:130px;
height:130px;
}

.heart::before,
.heart::after{
width:130px;
height:130px;
}

.heart::before{
top:-65px;
}

.heart::after{
left:65px;
}

.glow-ring{
width:250px;
height:250px;
}

.love-popup{
font-size:2rem;
}

}

</style>
</head>

<body>

<!-- LOADER -->

<div class="loader">
<h1>Loading Love ❤️</h1>
</div>

<!-- STARS -->

<div class="stars" id="stars"></div>

<!-- TITLE -->

<div class="title">
<h1>Radhu ❤️ Adi</h1>
<p>FOREVER TOGETHER</p>
</div>

<!-- HEART -->

<div class="heart-wrapper">
<div class="glow-ring"></div>
<div class="heart"></div>
</div>

<!-- MESSAGE -->

<div class="message">
<h2>I Love You Radhu ❤️</h2>
<p>You Are My Favourite Person Forever</p>
</div>

<!-- BUTTON -->

<button class="music-btn" onclick="playMusic()">
🎵 Play Music
</button>

<!-- SONG -->

<audio id="bgMusic" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<script>

/* MUSIC */

const music=document.getElementById("bgMusic");

/* MOBILE AUTOPLAY FIX */

document.body.addEventListener("click",()=>{

music.play();

},{once:true});

function playMusic(){

music.play();

}

/* STARS */

for(let i=0;i<150;i++){

const star=document.createElement("div");

star.classList.add("star");

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

star.style.animationDuration=
(2+Math.random()*5)+"s";

document.getElementById("stars")
.appendChild(star);

}

/* FLOATING HEARTS */

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("floating-heart");

heart.innerHTML="❤";

heart.style.left=
Math.random()*window.innerWidth+"px";

heart.style.fontSize=
(15+Math.random()*35)+"px";

heart.style.animationDuration=
(4+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,180);

/* HEART BURST */

function burst(){

for(let i=0;i<20;i++){

setTimeout(()=>{
createHeart();
},i*80);

}

}

setInterval(burst,4000);

/* CLICK EFFECT */

const mainHeart=document.querySelector(".heart");

mainHeart.addEventListener("click",()=>{

const text=document.createElement("div");

text.classList.add("love-popup");

text.innerHTML="I LOVE YOU RADHUU ❤️";

document.body.appendChild(text);

setTimeout(()=>{
text.remove();
},3000);

burst();

});

/* TEXT CHANGE */

const messages=[

"Forever Yours ❤️",
"My Favourite Person 💖",
"Only You Radhu 🌸",
"Love You Infinity ❤️"

];

setInterval(()=>{

const msg=document.querySelector(".message h2");

msg.innerHTML=
messages[Math.floor(Math.random()*messages.length)];

},4000);

</script>

</body>
</html>
